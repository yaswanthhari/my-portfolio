name: Python Tests and Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-file-organizer:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest watchdog pyyaml
    - name: Test with pytest
      run: |
        cd projects/01-file-organizer
        pytest tests/

  test-ai-cli-tool:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        cd projects/02-ai-cli-tool
        pip install -r requirements.txt
    - name: Test with pytest
      run: |
        cd projects/02-ai-cli-tool
        pytest tests/

  test-resume-parser:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest httpx
        cd projects/03-resume-parser
        # Install system dependencies for pdfplumber
        sudo apt-get update && sudo apt-get install -y build-essential libpoppler-cpp-dev pkg-config python3-dev
        pip install -r requirements.txt
        python -m spacy download en_core_web_sm
    - name: Test with pytest
      run: |
        cd projects/03-resume-parser
        pytest tests/
